name: release

on:
  push:
    tags:
      - "v*.*.*"

# Sigstore OIDC signing requires id-token: write. contents: write for Releases.
permissions:
  contents: write
  id-token: write

jobs:
  release:
    name: Build, sign, and publish GitHub Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build cyclonedx-bom sigstore

      - name: Build sdist and wheel
        run: python -m build

      - name: Verify the built wheel installs and CLI works
        run: |
          python -m venv /tmp/verify
          /tmp/verify/bin/pip install dist/*.whl
          /tmp/verify/bin/fpagent --version
          /tmp/verify/bin/fpagent schema | python -c "import sys, json; json.loads(sys.stdin.read())"

      - name: Generate CycloneDX SBOM
        run: |
          # Resolve the installed environment that contains the wheel so the
          # SBOM reflects exactly what a user would get.
          cyclonedx-py environment /tmp/verify \
            --output-format JSON \
            --output-file "dist/fpagent-${GITHUB_REF_NAME#v}.cdx.json"

      - name: Sign artifacts with Sigstore
        uses: sigstore/gh-action-sigstore-python@v3
        with:
          inputs: |
            dist/*.whl
            dist/*.tar.gz
            dist/*.cdx.json
          upload-signing-artifacts: true

      - name: Extract release notes from CHANGELOG.md
        run: |
          python - <<'PY' > release_notes.md
          import re, sys, os
          v = os.environ["GITHUB_REF_NAME"].lstrip("v")
          body = open("CHANGELOG.md").read()
          pat = re.compile(rf"^## \[{re.escape(v)}\].*?(?=^## \[|\Z)", re.MULTILINE | re.DOTALL)
          m = pat.search(body)
          sys.stdout.write(m.group(0) if m else f"Release {v}\n")
          PY

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_notes.md
          files: |
            dist/*.whl
            dist/*.tar.gz
            dist/*.cdx.json
            dist/*.sigstore.json
